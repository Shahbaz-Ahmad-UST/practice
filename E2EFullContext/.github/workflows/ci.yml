name: Shopkart CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  shopkart-test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_DATABASE: shopkart
          MYSQL_ROOT_PASSWORD: rajasoN@0073

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prajasoN@0073"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_JDBC_URL: jdbc:mysql://localhost:3306/shopkart
      DB_USER: root
      DB_PASSWORD: rajasoN@0073

      BASE_URL: ${{ secrets.APP_BASE_URL }}
      BACKEND_URL: ${{ secrets.BACKEND_URL }}

      USE_TESTCONTAINERS: "false"

      CUSTOMER_1_NAME: ${{ secrets.CUSTOMER_1_NAME }}
      CUSTOMER_2_NAME: ${{ secrets.CUSTOMER_2_NAME }}
      CUSTOMER_3_NAME: ${{ secrets.CUSTOMER_3_NAME }}
      CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}

      GRANT_TYPE: ${{ secrets.GRANT_TYPE }}
      GRANT_SECRET: ${{ secrets.GRANT_SECRET }}

      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}

      OAUTH_EXPIRED_CLIENT_ID: ${{ secrets.OAUTH_EXPIRED_CLIENT_ID }}
      OAUTH_EXPIRED_CLIENT_SECRET: ${{ secrets.OAUTH_EXPIRED_CLIENT_SECRET }}

      OAUTH_VIEWER_CLIENT_ID: ${{ secrets.OAUTH_VIEWER_CLIENT_ID }}
      OAUTH_VIEWER_CLIENT_SECRET: ${{ secrets.OAUTH_VIEWER_CLIENT_SECRET }}

      RETAIL_API_KEY: ${{ secrets.RETAIL_API_KEY }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot -prajasoN@0073 --silent && break
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done

      - name: Install Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run Repository Suite
        run: ./gradlew repositorySuite --rerun-tasks --info

      - name: Run Application Suite
        run: |
          xvfb-run -a ./gradlew applicationSuite \
            --rerun-tasks \
            --info \
            -Dheadless=true \
            -Dselenide.headless=true
        continue-on-error: true

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests
            build/test-results

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: build/allure-results

      - name: Verify Allure Results
        if: always()
        run: |
          mkdir -p build/allure-results

          if [ -z "$(ls -A build/allure-results 2>/dev/null)" ]; then
            echo "::error::No Allure results generated"
            exit 1
          fi

      - name: Write Allure Environment
        if: always()
        run: |
          mkdir -p build/allure-results

          cat > build/allure-results/environment.properties << EOF
          Browser=Chrome Headless
          BaseURL=${{ secrets.APP_BASE_URL }}
          Build=${{ github.run_number }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          OS=ubuntu-latest
          EOF

      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_history: allure-history
          allure_report: allure-report
          keep_reports: 20
          gh_pages: gh-pages


      - name: Publish Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Fail Build If Tests Failed
        if: always()
        run: |
          if [ -d build/reports/tests ] && grep -rl "FAILED" build/reports/tests --include="*.html" > /dev/null 2>&1; then
            echo "Tests failed"
            exit 1
          fi